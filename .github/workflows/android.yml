name: Build Zygisk Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Pakai Java 11 untuk mengakomodasi Gradle lama Anda
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11' 

      # Langkah Setup Android SDK & NDK dihapus total karena sudah ada bawaan dari GitHub!

      - name: Build Magisk Module
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Module zip
        uses: actions/upload-artifact@v4
        with:
          name: Zygisk-ESP-FFMAX
          path: app/build/outputs/apk/release/*.apk
